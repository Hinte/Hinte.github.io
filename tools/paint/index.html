<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint - Vẽ tranh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Title bar */
        .title-bar {
            background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #ccc;
        }

        .title-bar h1 {
            font-size: 14px;
            font-weight: normal;
            color: #333;
        }

        .back-btn {
            color: #0066cc;
            text-decoration: none;
            font-size: 12px;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Menu bar */
        .menu-bar {
            background: #f5f5f5;
            padding: 2px 5px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #ccc;
        }

        .menu-item {
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
        }

        .menu-item:hover {
            background: #e0e0e0;
        }

        /* Toolbar - MS Paint style */
        .toolbar {
            background: linear-gradient(180deg, #f8f8f8 0%, #e8e8e8 100%);
            padding: 8px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #bbb;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .tool-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .tool-section-label {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        .tool-group {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 4px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            border: 1px solid transparent;
            border-radius: 3px;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .tool-btn:hover {
            background: #cde4f7;
            border-color: #7eb4ea;
        }

        .tool-btn.active {
            background: #b3d7f5;
            border-color: #0078d7;
        }

        /* Shapes section */
        .shapes-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 4px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        /* Size section */
        .size-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .size-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .size-slider {
            width: 80px;
            cursor: pointer;
        }

        .size-value {
            font-size: 11px;
            width: 25px;
            text-align: center;
        }

        /* Colors section - MS Paint style */
        .colors-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .color-row {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .current-colors {
            display: flex;
            gap: 2px;
            margin-right: 8px;
        }

        .current-color-box {
            position: relative;
            width: 28px;
            height: 28px;
        }

        .color-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 22px;
            height: 22px;
            border: 1px solid #888;
            z-index: 2;
        }

        .color-2 {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 22px;
            height: 22px;
            border: 1px solid #888;
            z-index: 1;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1px;
            padding: 3px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .color-btn {
            width: 20px;
            height: 20px;
            border: 1px solid #999;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn:hover {
            transform: scale(1.2);
            z-index: 10;
            position: relative;
        }

        .color-btn.active {
            border: 2px solid #000;
        }

        /* Main area */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Canvas area */
        .canvas-area {
            flex: 1;
            background: #808080;
            padding: 10px;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .canvas-wrapper {
            background: #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        #canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* Status bar */
        .status-bar {
            background: #f0f0f0;
            border-top: 1px solid #ccc;
            padding: 3px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #555;
        }

        .status-left {
            display: flex;
            gap: 20px;
        }

        /* Action buttons in menu */
        .action-buttons {
            display: flex;
            gap: 5px;
            margin-left: auto;
            padding-right: 10px;
        }

        .action-btn {
            padding: 4px 12px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: linear-gradient(180deg, #e8f4fc 0%, #d0e8f8 100%);
            border-color: #7eb4ea;
        }

        .action-btn.danger:hover {
            background: linear-gradient(180deg, #ffe8e8 0%, #ffd0d0 100%);
            border-color: #ea7e7e;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .toolbar {
                padding: 5px;
                gap: 8px;
            }

            .tool-btn {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .color-btn {
                width: 24px;
                height: 24px;
            }

            .color-palette {
                grid-template-columns: repeat(10, 1fr);
            }

            .menu-bar {
                flex-wrap: wrap;
            }

            .action-buttons {
                margin-left: 0;
                margin-top: 5px;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Title bar -->
    <div class="title-bar">
        <a href="/" class="back-btn">← Trang chủ</a>
        <h1>Paint - Vẽ Tranh</h1>
    </div>

    <!-- Menu bar -->
    <div class="menu-bar">
        <span class="menu-item" onclick="newCanvas()">Mới</span>
        <span class="menu-item" onclick="saveImage()">Lưu</span>
        <span class="menu-item" onclick="undo()">Hoàn tác</span>
        <span class="menu-item" onclick="clearCanvas()">Xóa hết</span>

        <div class="action-buttons">
            <button class="action-btn" onclick="undo()" title="Hoàn tác (Ctrl+Z)">↩ Undo</button>
            <button class="action-btn danger" onclick="clearCanvas()" title="Xóa hết">🗑 Xóa</button>
            <button class="action-btn" onclick="saveImage()" title="Lưu ảnh">💾 Lưu</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <!-- Tools -->
        <div class="tool-section">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="brush" title="Bút chì">✏️</button>
                <button class="tool-btn" data-tool="eraser" title="Tẩy">🧹</button>
                <button class="tool-btn" data-tool="fill" title="Đổ màu">🪣</button>
            </div>
            <span class="tool-section-label">Công cụ</span>
        </div>

        <!-- Shapes -->
        <div class="tool-section">
            <div class="shapes-group">
                <button class="tool-btn" data-tool="line" title="Đường thẳng">╱</button>
                <button class="tool-btn" data-tool="rect" title="Hình chữ nhật">▭</button>
                <button class="tool-btn" data-tool="circle" title="Hình tròn">○</button>
                <button class="tool-btn" data-tool="fillRect" title="HCN tô màu">▬</button>
                <button class="tool-btn" data-tool="fillCircle" title="Tròn tô màu">●</button>
                <button class="tool-btn" data-tool="triangle" title="Tam giác">△</button>
            </div>
            <span class="tool-section-label">Hình dạng</span>
        </div>

        <!-- Size -->
        <div class="tool-section">
            <div class="size-section">
                <div class="size-row">
                    <span style="font-size:11px;">Cỡ:</span>
                    <input type="range" class="size-slider" id="brushSize" min="1" max="50" value="5">
                    <span class="size-value" id="sizeValue">5</span>
                </div>
            </div>
            <span class="tool-section-label">Kích cỡ</span>
        </div>

        <!-- Colors -->
        <div class="tool-section">
            <div class="colors-section">
                <div class="color-row">
                    <div class="current-colors">
                        <div class="current-color-box">
                            <div class="color-1" id="color1" style="background: #000000;" title="Màu 1 (chuột trái)"></div>
                            <div class="color-2" id="color2" style="background: #FFFFFF;" title="Màu 2 (chuột phải)"></div>
                        </div>
                    </div>
                    <div class="color-palette">
                        <!-- Row 1 - Basic colors -->
                        <button class="color-btn active" data-color="#000000" style="background: #000000;"></button>
                        <button class="color-btn" data-color="#7F7F7F" style="background: #7F7F7F;"></button>
                        <button class="color-btn" data-color="#880015" style="background: #880015;"></button>
                        <button class="color-btn" data-color="#ED1C24" style="background: #ED1C24;"></button>
                        <button class="color-btn" data-color="#FF7F27" style="background: #FF7F27;"></button>
                        <button class="color-btn" data-color="#FFF200" style="background: #FFF200;"></button>
                        <button class="color-btn" data-color="#22B14C" style="background: #22B14C;"></button>
                        <button class="color-btn" data-color="#00A2E8" style="background: #00A2E8;"></button>
                        <button class="color-btn" data-color="#3F48CC" style="background: #3F48CC;"></button>
                        <button class="color-btn" data-color="#A349A4" style="background: #A349A4;"></button>
                        <!-- Row 2 -->
                        <button class="color-btn" data-color="#FFFFFF" style="background: #FFFFFF;"></button>
                        <button class="color-btn" data-color="#C3C3C3" style="background: #C3C3C3;"></button>
                        <button class="color-btn" data-color="#B97A57" style="background: #B97A57;"></button>
                        <button class="color-btn" data-color="#FFAEC9" style="background: #FFAEC9;"></button>
                        <button class="color-btn" data-color="#FFC90E" style="background: #FFC90E;"></button>
                        <button class="color-btn" data-color="#EFE4B0" style="background: #EFE4B0;"></button>
                        <button class="color-btn" data-color="#B5E61D" style="background: #B5E61D;"></button>
                        <button class="color-btn" data-color="#99D9EA" style="background: #99D9EA;"></button>
                        <button class="color-btn" data-color="#7092BE" style="background: #7092BE;"></button>
                        <button class="color-btn" data-color="#C8BFE7" style="background: #C8BFE7;"></button>
                    </div>
                </div>
            </div>
            <span class="tool-section-label">Màu sắc</span>
        </div>
    </div>

    <!-- Main canvas area -->
    <div class="main-area">
        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="canvas" width="800" height="500"></canvas>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-left">
            <span id="coordStatus">X: 0, Y: 0</span>
            <span id="sizeStatus">800 x 500 px</span>
        </div>
        <span id="toolStatus">Bút chì</span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // State
        let isDrawing = false;
        let currentTool = 'brush';
        let color1 = '#000000'; // Left click color
        let color2 = '#FFFFFF'; // Right click color
        let currentColor = color1;
        let brushSize = 5;
        let startX, startY;
        let history = [];
        let historyIndex = -1;
        let tempCanvas, tempCtx;

        // Tool names
        const toolNames = {
            brush: 'Bút chì',
            eraser: 'Tẩy',
            fill: 'Đổ màu',
            line: 'Đường thẳng',
            rect: 'Hình chữ nhật',
            circle: 'Hình tròn',
            fillRect: 'HCN tô màu',
            fillCircle: 'Tròn tô màu',
            triangle: 'Tam giác'
        };

        // Initialize
        function init() {
            // Create temp canvas for shape preview
            tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx = tempCanvas.getContext('2d');

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();

            // Prevent context menu on canvas
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        // Save state for undo
        function saveState() {
            historyIndex++;
            history = history.slice(0, historyIndex);
            history.push(canvas.toDataURL());
            if (history.length > 30) {
                history.shift();
                historyIndex--;
            }
        }

        // Undo
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyIndex];
            }
        }

        // Get position
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: Math.floor((clientX - rect.left) * scaleX),
                y: Math.floor((clientY - rect.top) * scaleY)
            };
        }

        // Update coord status
        function updateCoords(e) {
            const pos = getPos(e);
            document.getElementById('coordStatus').textContent = `X: ${pos.x}, Y: ${pos.y}`;
        }

        // Start drawing
        function startDraw(e) {
            e.preventDefault();

            // Set color based on mouse button
            if (e.button === 2) {
                currentColor = color2;
            } else {
                currentColor = color1;
            }

            isDrawing = true;
            const pos = getPos(e);
            startX = pos.x;
            startY = pos.y;

            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX, startY);
                ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.stroke();
            } else if (currentTool === 'fill') {
                floodFill(startX, startY, currentColor);
                saveState();
                isDrawing = false;
            }
        }

        // Draw
        function draw(e) {
            updateCoords(e);
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);

            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (['line', 'rect', 'circle', 'fillRect', 'fillCircle', 'triangle'].includes(currentTool)) {
                // Preview shape
                tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.drawImage(canvas, 0, 0);
                drawShape(tempCtx, startX, startY, pos.x, pos.y, currentTool, currentColor, brushSize);

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(tempCanvas, 0, 0);
            }
        }

        // End drawing
        function endDraw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const pos = e.changedTouches ?
                { x: startX, y: startY } : // For touch, use last known position
                getPos(e);

            if (['line', 'rect', 'circle', 'fillRect', 'fillCircle', 'triangle'].includes(currentTool)) {
                // Restore original and draw final shape
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    drawShape(ctx, startX, startY, pos.x, pos.y, currentTool, currentColor, brushSize);
                    saveState();
                };
                img.src = history[historyIndex];
            } else if (currentTool === 'brush' || currentTool === 'eraser') {
                saveState();
            }

            isDrawing = false;
        }

        // Draw shape
        function drawShape(context, x1, y1, x2, y2, tool, color, size) {
            context.strokeStyle = color;
            context.fillStyle = color;
            context.lineWidth = size;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            switch (tool) {
                case 'line':
                    context.beginPath();
                    context.moveTo(x1, y1);
                    context.lineTo(x2, y2);
                    context.stroke();
                    break;
                case 'rect':
                    context.strokeRect(x1, y1, x2 - x1, y2 - y1);
                    break;
                case 'fillRect':
                    context.fillRect(x1, y1, x2 - x1, y2 - y1);
                    break;
                case 'circle':
                    const radius = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                    context.beginPath();
                    context.arc(x1, y1, radius, 0, Math.PI * 2);
                    context.stroke();
                    break;
                case 'fillCircle':
                    const r = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                    context.beginPath();
                    context.arc(x1, y1, r, 0, Math.PI * 2);
                    context.fill();
                    break;
                case 'triangle':
                    context.beginPath();
                    context.moveTo((x1 + x2) / 2, y1);
                    context.lineTo(x1, y2);
                    context.lineTo(x2, y2);
                    context.closePath();
                    context.stroke();
                    break;
            }
        }

        // Flood fill
        function floodFill(x, y, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const targetColor = getPixelColor(data, x, y, width);
            const fill = hexToRgb(fillColor);

            if (colorsMatch(targetColor, fill)) return;

            const stack = [[x, y]];
            const visited = new Set();

            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                const key = `${cx},${cy}`;

                if (visited.has(key)) continue;
                if (cx < 0 || cx >= width || cy < 0 || cy >= height) continue;

                const currentColor = getPixelColor(data, cx, cy, width);
                if (!colorsMatch(currentColor, targetColor)) continue;

                visited.add(key);
                setPixelColor(data, cx, cy, width, fill);

                stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(data, x, y, width) {
            const i = (y * width + x) * 4;
            return { r: data[i], g: data[i + 1], b: data[i + 2] };
        }

        function setPixelColor(data, x, y, width, color) {
            const i = (y * width + x) * 4;
            data[i] = color.r;
            data[i + 1] = color.g;
            data[i + 2] = color.b;
            data[i + 3] = 255;
        }

        function colorsMatch(c1, c2) {
            return Math.abs(c1.r - c2.r) < 10 &&
                   Math.abs(c1.g - c2.g) < 10 &&
                   Math.abs(c1.b - c2.b) < 10;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // Clear canvas
        function clearCanvas() {
            if (confirm('Bạn có chắc muốn xóa hết không?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }
        }

        // New canvas
        function newCanvas() {
            if (confirm('Tạo bản vẽ mới? Bản vẽ hiện tại sẽ bị xóa.')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                history = [];
                historyIndex = -1;
                saveState();
            }
        }

        // Save image
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'tranh-cua-toi.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Event listeners
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);

        // Track mouse position even when not drawing
        canvas.addEventListener('mousemove', updateCoords);

        // Tool buttons
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                document.getElementById('toolStatus').textContent = toolNames[currentTool] || currentTool;
            });
        });

        // Color buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                color1 = btn.dataset.color;
                document.getElementById('color1').style.background = color1;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
            btn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                color2 = btn.dataset.color;
                document.getElementById('color2').style.background = color2;
            });
        });

        // Brush size
        document.getElementById('brushSize').addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('sizeValue').textContent = brushSize;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undo();
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveImage();
            }
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                newCanvas();
            }
        });

        // Initialize
        window.addEventListener('load', init);
    </script>
</body>
</html>
