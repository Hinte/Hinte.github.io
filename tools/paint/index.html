<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint - Vẽ tranh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #555;
            font-size: 1rem;
        }

        .paint-app {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
            align-items: center;
        }

        .tool-group {
            display: flex;
            gap: 5px;
            padding: 5px 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tool-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #e3f2fd;
            border-color: #2196F3;
        }

        .tool-btn.active {
            background: #2196F3;
            border-color: #1976D2;
            color: white;
        }

        /* Colors */
        .colors-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 5px 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border: 3px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.15);
        }

        .color-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }

        /* Brush size */
        .size-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .size-label {
            font-weight: bold;
            color: #555;
        }

        .size-slider {
            width: 100px;
            cursor: pointer;
        }

        .size-preview {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .size-dot {
            background: #333;
            border-radius: 50%;
        }

        /* Canvas */
        .canvas-container {
            padding: 15px;
            background: #e0e0e0;
        }

        #canvas {
            display: block;
            margin: 0 auto;
            background: white;
            border: 3px solid #999;
            border-radius: 4px;
            cursor: crosshair;
            touch-action: none;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #f5f5f5;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn.clear {
            background: #ff5252;
            color: white;
        }

        .action-btn.clear:hover {
            background: #d32f2f;
        }

        .action-btn.save {
            background: #4CAF50;
            color: white;
        }

        .action-btn.save:hover {
            background: #388E3C;
        }

        .action-btn.undo {
            background: #FF9800;
            color: white;
        }

        .action-btn.undo:hover {
            background: #F57C00;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #555;
            text-decoration: none;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .back-btn:hover {
            color: #333;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .toolbar {
                padding: 10px;
                gap: 8px;
            }

            .tool-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .color-btn {
                width: 30px;
                height: 30px;
            }

            .action-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Trang chủ</a>

        <header>
            <h1>Paint - Vẽ Tranh</h1>
            <p class="subtitle">Công cụ vẽ tranh đơn giản cho các bạn nhỏ</p>
        </header>

        <div class="paint-app">
            <div class="toolbar">
                <!-- Tools -->
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="brush" title="Bút vẽ">
                        ✏️
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Tẩy">
                        🧽
                    </button>
                    <button class="tool-btn" data-tool="fill" title="Đổ màu">
                        🪣
                    </button>
                </div>

                <!-- Shapes -->
                <div class="tool-group">
                    <button class="tool-btn" data-tool="line" title="Đường thẳng">
                        ➖
                    </button>
                    <button class="tool-btn" data-tool="rect" title="Hình chữ nhật">
                        ⬜
                    </button>
                    <button class="tool-btn" data-tool="circle" title="Hình tròn">
                        ⭕
                    </button>
                </div>

                <!-- Brush size -->
                <div class="size-group">
                    <span class="size-label">Cỡ:</span>
                    <input type="range" class="size-slider" id="brushSize" min="2" max="50" value="8">
                    <div class="size-preview">
                        <div class="size-dot" id="sizeDot"></div>
                    </div>
                </div>

                <!-- Colors -->
                <div class="colors-container">
                    <button class="color-btn active" data-color="#000000" style="background: #000000;" title="Đen"></button>
                    <button class="color-btn" data-color="#FFFFFF" style="background: #FFFFFF;" title="Trắng"></button>
                    <button class="color-btn" data-color="#FF0000" style="background: #FF0000;" title="Đỏ"></button>
                    <button class="color-btn" data-color="#FF9800" style="background: #FF9800;" title="Cam"></button>
                    <button class="color-btn" data-color="#FFEB3B" style="background: #FFEB3B;" title="Vàng"></button>
                    <button class="color-btn" data-color="#4CAF50" style="background: #4CAF50;" title="Xanh lá"></button>
                    <button class="color-btn" data-color="#2196F3" style="background: #2196F3;" title="Xanh dương"></button>
                    <button class="color-btn" data-color="#9C27B0" style="background: #9C27B0;" title="Tím"></button>
                    <button class="color-btn" data-color="#E91E63" style="background: #E91E63;" title="Hồng"></button>
                    <button class="color-btn" data-color="#795548" style="background: #795548;" title="Nâu"></button>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="canvas" width="800" height="500"></canvas>
            </div>

            <div class="actions">
                <button class="action-btn undo" id="undoBtn">
                    ↩️ Hoàn tác
                </button>
                <button class="action-btn clear" id="clearBtn">
                    🗑️ Xóa hết
                </button>
                <button class="action-btn save" id="saveBtn">
                    💾 Lưu ảnh
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // State
        let isDrawing = false;
        let currentTool = 'brush';
        let currentColor = '#000000';
        let brushSize = 8;
        let startX, startY;
        let history = [];
        let historyIndex = -1;

        // Initialize canvas
        function initCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
            updateSizePreview();
        }

        // Resize canvas for mobile
        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const maxWidth = container.clientWidth - 30;
            if (maxWidth < 800) {
                const ratio = maxWidth / 800;
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (500 * ratio) + 'px';
            }
        }

        // Save state for undo
        function saveState() {
            historyIndex++;
            history = history.slice(0, historyIndex);
            history.push(canvas.toDataURL());
            if (history.length > 20) {
                history.shift();
                historyIndex--;
            }
        }

        // Undo
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyIndex];
            }
        }

        // Get position
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // Drawing functions
        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            startX = pos.x;
            startY = pos.y;

            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            } else if (currentTool === 'fill') {
                floodFill(Math.floor(startX), Math.floor(startY), currentColor);
                saveState();
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);

            if (currentTool === 'brush') {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (currentTool === 'eraser') {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = brushSize * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }
        }

        function endDraw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);

            if (currentTool === 'line') {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (currentTool === 'rect') {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
            } else if (currentTool === 'circle') {
                const radius = Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2));
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = brushSize;
                ctx.beginPath();
                ctx.arc(startX, startY, radius, 0, Math.PI * 2);
                ctx.stroke();
            }

            isDrawing = false;
            if (currentTool !== 'fill') {
                saveState();
            }
        }

        // Flood fill algorithm
        function floodFill(x, y, fillColor) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const targetColor = getPixelColor(data, x, y, width);
            const fill = hexToRgb(fillColor);

            if (colorsMatch(targetColor, fill)) return;

            const stack = [[x, y]];
            const visited = new Set();

            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                const key = `${cx},${cy}`;

                if (visited.has(key)) continue;
                if (cx < 0 || cx >= width || cy < 0 || cy >= height) continue;

                const currentColor = getPixelColor(data, cx, cy, width);
                if (!colorsMatch(currentColor, targetColor)) continue;

                visited.add(key);
                setPixelColor(data, cx, cy, width, fill);

                stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(data, x, y, width) {
            const i = (y * width + x) * 4;
            return { r: data[i], g: data[i + 1], b: data[i + 2], a: data[i + 3] };
        }

        function setPixelColor(data, x, y, width, color) {
            const i = (y * width + x) * 4;
            data[i] = color.r;
            data[i + 1] = color.g;
            data[i + 2] = color.b;
            data[i + 3] = 255;
        }

        function colorsMatch(c1, c2) {
            return Math.abs(c1.r - c2.r) < 10 &&
                   Math.abs(c1.g - c2.g) < 10 &&
                   Math.abs(c1.b - c2.b) < 10;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // Update size preview
        function updateSizePreview() {
            const dot = document.getElementById('sizeDot');
            const size = Math.min(brushSize, 35);
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
        }

        // Event listeners
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);

        // Tool buttons
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });
        });

        // Color buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });

        // Brush size
        document.getElementById('brushSize').addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            updateSizePreview();
        });

        // Action buttons
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Bạn có chắc muốn xóa hết tranh không?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'tranh-cua-toi.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.getElementById('undoBtn').addEventListener('click', undo);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                undo();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            initCanvas();
            resizeCanvas();
        });
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
